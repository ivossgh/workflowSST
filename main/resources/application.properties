spring.application.name=sistema-sst

# Porta do servidor (padrão 8080)
server.port=8080

# URL de conexão com o PostgreSQL
# Formato: jdbc:postgresql://HOST:PORTA/NOME_DO_BANCO
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema-sst

# Usuário do banco
spring.datasource.username=postgres

# Senha do banco
spring.datasource.password=17011998

# Driver JDBC do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialeto: ensina ao Hibernate como gerar SQL para o PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto: o que fazer com as tabelas ao iniciar
# create       → apaga tudo e recria (só para testes!)
# create-drop  → cria ao subir, apaga ao encerrar
# update       → atualiza sem apagar dados (usaremos agora)
# validate     → só valida, não altera nada
# none         → não faz nada
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL gerado pelo Hibernate no console
spring.jpa.show-sql=true

# Formata o SQL para ficar legível no console
spring.jpa.properties.hibernate.format_sql=true

# Desabilita cache de templates em desenvolvimento
# (mudanças no HTML aparecem sem reiniciar)
spring.thymeleaf.cache=false


# Reinício automático ao salvar arquivos
spring.devtools.restart.enabled=true