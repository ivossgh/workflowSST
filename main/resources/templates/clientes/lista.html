<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST - Listagem de Clientes</title>
    <!-- Bootstrap 5 via CDN para um visual limpo e rápido -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-content-center">
                <h3 class="mb-0">Clientes Cadastrados</h3>
                <!-- Botão para um futuro formulário de cadastro -->
                <a href="/clientes/novo" class="btn btn-success btn-sm">Novo Cliente</a>
            </div>
            
            <div class="card-body">
                <!-- Tabela Responsiva -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>CNPJ</th>
                                <th>Cidade</th>
                                <th>Telefone</th>
                                <th>Setor</th>
                                <th>Status</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- O Thymeleaf percorre a lista 'clientes' enviada pelo Controller -->
                            <tr th:each="cliente : ${clientes}">
                                <td th:text="${cliente.nome}">Nome do Cliente</td>
                                <td th:text="${cliente.cnpj}">00.000.000/0001-00</td>
                                <td th:text="${cliente.cidade}">Cidade</td>
                                <td th:text="${cliente.telefone}">(00) 00000-0000</td>
                                <td>
                                    <!-- Acessa o método getDescricao() do seu Enum Setor -->
                                    <span class="badge bg-secondary" th:text="${cliente.setorEmpresa.descricao}">Setor</span>
                                </td>
                                <td>
                                    <!-- Altera a cor do badge dinamicamente dependendo do Status -->
                                    <span th:text="${cliente.statusEmpresa.descricao}"
                                          th:classappend="${cliente.statusEmpresa.name() == 'ATIVO'} ? 'badge bg-success' : 'badge bg-danger'">
                                        Status
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <!-- Botão que chama o seu método de inativar -->
                                        <form th:action="@{/clientes/inativar/{id}(id=${cliente.id})}" method="post" style="display:inline;">
                                            <button type="submit" class="btn btn-warning" 
                                                    th:if="${cliente.statusEmpresa.name() == 'ATIVO'}"
                                                    onclick="return confirm('Deseja realmente inativar este cliente?')">
                                                Inativar
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <!-- Mensagem caso a lista esteja vazia -->
                            <tr th:if="${#lists.isEmpty(clientes)}">
                                <td colspan="7" class="text-center text-muted py-4">Nenhum cliente cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS para componentes interativos caso precise -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
