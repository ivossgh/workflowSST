<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <main>
        <section>
            <h2>
                Nova Empresa
            </h2>

            <form th:action="@{/clientes}"
                th:object="${cliente}" method="post">

                <div class="campo">
                    <label for="nome">Nome da Empresa</label>
                    <input type="text" id="nome" th:field="*{nome}" required>
                </div>

                <div class="campo">
                    <label for="cnpj">CNPJ da Empresa</label>
                    <input type="text" id="cnpj" th:field="*{cnpj}" placeholder="Ex: 12345678000195" required>
                </div>

                <div class="campo">
                    <label for="cidade">Cidade da Empresa</label>
                    <input type="text" id="cidade" th:field="*{cidade}" placeholder="Ex: Picos" required>
                </div>

                <div class="campo">
                    <label for="telefone">Telefone da Empresa</label>
                    <input type="text" id="telefone" th:field="*{telefone}" placeholder="Ex: 89981173746" required>
                </div>

                <div class="campo">
                    <label for="setorEmpresa">Segmento da Empresa</label>
                    <select class="form-select" id="setorEmpresa" th:field="*{setorEmpresa}" required>
                        <option value="">Selecione o Segmento</option>

                        <option th:each="s : ${T(sistema.sst.models.enums.Setor).values()}"
                                th:value="${s}"
                                th:text="${s.descricao}">
                        </option>
                    </select>
                </div>

                <div class="campo">
                    <label for="statusEmpresa">Status do Cliente</label>
                    <select class="form-select" id="statusEmpresa" th:field="*{statusEmpresa}" required>
                        <option value="">Selecione o Status</option>

                        <option th:each="s : ${T(sistema.sst.models.enums.Status).values()}"
                                th:value="${s}"
                                th:text="${s.descricao}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Cadastrar
                </button>

            </form>
        </section>
    </main>
</body>
