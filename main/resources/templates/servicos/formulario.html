<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cadastrar Servico</title>
</head>
<body>
    <main>
        <section>
            <h2>
                Novo Serviço
            </h2>

            <form th:action="@{/servicos}"
                th:object="${servico}" method="post">

                <div class="campo">
                    <label for="nome">Nome do Serviço</label>
                    <input type="text" id="nome" th:field="*{nome}" required>
                </div>

                <div class="campo">
                    <label for="precoBase">Preço do Serviço</label>
                    <input type="number" id="precoBase" th:field="*{precoBase}" step="0.01" min="0" placeholder="Ex: 150.00" required>
                </div>

                <div class="campo">
                    <label for="tipo">Tipo da Serviço</label>
                    <select class="form-select" id="tipo" th:field="*{tipo}" required>
                        <option value="">Selecione o Tipo</option>

                        <option th:each="t : ${T(sistema.sst.models.enums.TipoServico).values()}"
                                th:value="${t}"
                                th:text="${t.descricao}">
                        </option>
                    </select>
                </div>

                <div class="campo">
                    <input type="checkbox" class="form-check-input"
                    id="ativo" th:field="*{ativo}">
                    <label class="form-check-label" for="ativo">Serviço</label>
                </div>

                <div class="campo">
                    <label for="descricao">Descricao do Serviço</label>
                    <input type="text" id="descricao" th:field="*{descricao}">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Cadastrar
                </button>
            </form>
        </section>
    </main>
    
</body>
</html>
